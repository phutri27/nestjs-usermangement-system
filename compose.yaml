services:
  db:
    image: postgres
    restart: always
    shm_size: 512mb
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5433:5432"
    networks: 
      - prisma-network 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"] 
      interval: 5s 
      timeout: 2s 
      retries: 20 
    volumes: 
      - pgdata:/var/lib/postgresql
    command: postgres -c listen_addresses='*'
    logging: 
      options: 
        max-size: "10m"
        max-file: "3"
  backend:
    build:
      args:
        DATABASE_URL: ${DATABASE_URL}
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - prisma-network
    develop:
      watch:
        - action: sync+restart
          path: .
          target: /app
        - action: rebuild
          path: package.json

networks: 
  prisma-network: 
volumes:
  pgdata: